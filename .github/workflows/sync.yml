name: 上游自动同步

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com/7Sageer/sublink-worker.git
          git fetch upstream

          git checkout main

          if git merge upstream/main --no-edit; then
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              git push origin main
              echo "SYNC_STATUS=updated" >> $GITHUB_ENV
            else
              echo "SYNC_STATUS=up-to-date" >> $GITHUB_ENV
            fi
          else
            git merge --abort
            echo "SYNC_STATUS=conflict" >> $GITHUB_ENV
          fi

      - name: Create Issue on Conflict
        if: env.SYNC_STATUS == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '上游同步冲突，需要手动处理',
                body: [
                  '自动同步上游 `7Sageer/sublink-worker` 时发生了合并冲突。',
                  '',
                  '请手动解决冲突：',
                  '```bash',
                  'git remote add upstream https://github.com/7Sageer/sublink-worker.git',
                  'git fetch upstream',
                  'git merge upstream/main',
                  '# 解决冲突后',
                  'git add .',
                  'git commit',
                  'git push',
                  '```',
                  '',
                  '解决后请关闭此 Issue。'
                ].join('\n'),
                labels: ['sync-conflict']
              });
            }

      - name: Fail on Conflict
        if: env.SYNC_STATUS == 'conflict'
        run: |
          echo "::error::上游同步失败：存在合并冲突，已创建 Issue 通知"
          exit 1
